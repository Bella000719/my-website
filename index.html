<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘰嘰喳喳大作戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bird-card:hover { transform: translateY(-5px); transition: 0.3s; }
        .correct { background-color: #10B981 !important; color: white; }
        .wrong { background-color: #EF4444 !important; color: white; }
        .audio-controls { display: flex; gap: 0.5rem; justify-content: center; }
        .control-btn {
            background-color: #10B981;
            hover: #059669;
            color: white;
            border: none;
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .control-btn:hover {
            background-color: #059669;
            transform: scale(1.05);
        }
        .control-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans">

    <header class="bg-emerald-600 text-white py-10 text-center shadow-lg">
        <h1 class="text-4xl font-bold">嘰嘰喳喳大作戰</h1>
        <p class="mt-2 text-emerald-100">都市常見鳥類叫聲學習網</p>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <h2 class="text-2xl font-bold mb-6 border-l-4 border-emerald-500 pl-3">鳥類圖鑑</h2>
        <div id="bird-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>

        <hr class="my-16 border-stone-300">

        <section id="quiz-section" class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-xl mb-20">
            <h2 class="text-3xl font-bold text-center mb-8">聽力大考驗</h2>
            
            <div class="flex flex-col items-center">
                <button id="play-quiz-btn" class="bg-emerald-500 hover:bg-emerald-600 text-white w-20 h-20 rounded-full flex items-center justify-center shadow-lg transition mb-8">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </button>
                
                <p class="text-stone-500 mb-6 italic">點擊上方按鈕聆聽題目</p>

                <div id="options-container" class="w-full grid grid-cols-1 gap-4">
                    </div>

                <button id="next-btn" class="mt-8 hidden bg-stone-800 text-white px-6 py-2 rounded-full hover:bg-stone-700">下一題</button>
            </div>
        </section>
    </main>

    <script>
        // 鳥類資料設定
        const birdData = [
            { id: '1', name: '黑冠麻鷺', img: 'https://raw.githubusercontent.com/mingpnyy/my-website/main/img/black_crowned.JPG', audio: 'https://raw.githubusercontent.com/mingpnyy/my-website/main/audio/black_crowned.mp3' },
            { id: '2', name: '喜鵲', img: 'https://raw.githubusercontent.com/mingpnyy/my-website/main/img/magpie.JPG', audio: 'https://raw.githubusercontent.com/mingpnyy/my-website/main/audio/magpie.mp3' },
            { id: '3', name: '五色鳥', img: 'https://raw.githubusercontent.com/mingpnyy/my-website/main/img/barbet.JPG', audio: 'https://raw.githubusercontent.com/mingpnyy/my-website/main/audio/barbet.mp3' },
            { id: '4', name: '白頭翁', img: 'https://raw.githubusercontent.com/mingpnyy/my-website/main/img/bulbul.JPG', audio: 'https://raw.githubusercontent.com/mingpnyy/my-website/main/audio/bulbul.mp3' },
            { id: '5', name: '麻雀', img: 'https://raw.githubusercontent.com/mingpnyy/my-website/main/img/sparrow.JPG', audio: 'https://raw.githubusercontent.com/mingpnyy/my-website/main/audio/sparrow.mp3' },
            { id: '6', name: '珠頸斑鳩', img: 'https://raw.githubusercontent.com/mingpnyy/my-website/main/img/dove.JPG', audio: 'https://raw.githubusercontent.com/mingpnyy/my-website/main/audio/dove.mp3' },
            { id: '7', name: '家八哥', img: 'https://raw.githubusercontent.com/mingpnyy/my-website/main/img/myna.JPG', audio: 'https://raw.githubusercontent.com/mingpnyy/my-website/main/audio/myna.mp3' }
        ];

        const birdGrid = document.getElementById('bird-grid');
        const playQuizBtn = document.getElementById('play-quiz-btn');
        const optionsContainer = document.getElementById('options-container');
        const nextBtn = document.getElementById('next-btn');

        let currentQuizBird = null;
        let quizAudio = new Audio();
        let birdAudios = {}; // 存儲每個鳥類的音頻對象

        // 1. 初始化圖鑑
        birdData.forEach(bird => {
            // 創建音頻對象
            const audio = new Audio(bird.audio);
            birdAudios[bird.id] = audio;

            const card = document.createElement('div');
            card.className = 'bird-card bg-white rounded-xl overflow-hidden shadow-md cursor-pointer border-2 border-transparent hover:border-emerald-400';
            card.innerHTML = `
                <img src="${bird.img}" alt="${bird.name}" class="w-full h-48 object-cover">
                <div class="p-4 text-center font-bold text-lg">${bird.name}</div>
                <div class="audio-controls pb-4">
                    <button class="control-btn play-btn" data-bird-id="${bird.id}" title="播放">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        播放
                    </button>
                    <button class="control-btn pause-btn" data-bird-id="${bird.id}" title="暫停">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
                        </svg>
                        暫停
                    </button>
                    <button class="control-btn replay-btn" data-bird-id="${bird.id}" title="重播">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
                        </svg>
                        重播
                    </button>
                </div>
            `;
            birdGrid.appendChild(card);
        });

        // 2. 添加音頻控制事件監聽
        document.querySelectorAll('.play-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const birdId = btn.dataset.birdId;
                birdAudios[birdId].play();
            });
        });

        document.querySelectorAll('.pause-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const birdId = btn.dataset.birdId;
                birdAudios[birdId].pause();
            });
        });

        document.querySelectorAll('.replay-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const birdId = btn.dataset.birdId;
                const audio = birdAudios[birdId];
                audio.currentTime = 0;
                audio.play();
            });
        });

        // 3. 測驗功能邏輯             
        function startQuiz() {
            nextBtn.classList.add('hidden');
            optionsContainer.innerHTML = '';
            
            // 隨機選一個正確答案
            currentQuizBird = birdData[Math.floor(Math.random() * birdData.length)];
            quizAudio.src = currentQuizBird.audio;

            // 產生選項 (正確 + 隨機挑兩個錯誤的)
            let options = [currentQuizBird.name];
            let otherBirds = birdData.filter(b => b.name !== currentQuizBird.name);
            otherBirds.sort(() => 0.5 - Math.random());
            options.push(otherBirds[0].name, otherBirds[1].name);
            
            // 洗牌選項順序
            options.sort(() => 0.5 - Math.random());

            // 渲染按鈕
            options.forEach(optName => {
                const btn = document.createElement('button');
                btn.className = 'w-full py-3 px-6 text-lg border-2 border-stone-200 rounded-xl hover:bg-stone-100 transition duration-200';
                btn.innerText = optName;
                btn.onclick = () => checkAnswer(btn, optName);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedBtn, chosenName) {
            const allButtons = optionsContainer.querySelectorAll('button');
            allButtons.forEach(btn => btn.disabled = true); // 禁止重複點擊

            if (chosenName === currentQuizBird.name) {
                selectedBtn.classList.add('correct');
                nextBtn.classList.remove('hidden');
            } else {
                selectedBtn.classList.add('wrong');
                // 顯示正確答案
                allButtons.forEach(btn => {
                    if (btn.innerText === currentQuizBird.name) btn.classList.add('correct');
                });
                nextBtn.classList.remove('hidden');
            }
        }

        // 事件監聽
        playQuizBtn.onclick = () => quizAudio.play();
        nextBtn.onclick = startQuiz;

        // 頁面加載後初始化測驗
        window.onload = startQuiz;

    </script>
</body>
</html>
